theme: jekyll-theme-cayman
markdown: kramdown

title: "GitHub Traffic & Downloads Dashboard"
description: "Tracks historical GitHub traffic (clones, views, referrers) and release download statistics split by platform and architecture. Renders graphs and statistics for 30 days, 90 days, and lifetime, updated automatically via GitHub Actions."
author: "itsab1989"
lang: en
# A focused keyword set. Search engines ignore (or mildly penalize) long keyword
# lists, so this is kept to the terms that actually describe the project.
keywords:
  - github traffic dashboard
  - repository analytics
  - clone and view statistics
  - release download statistics
  - github actions automation
  - data visualization

plugins:
  - jekyll-sitemap

url: "https://itsab1989.github.io"
baseurl: "/github-traffic-downloads-dashboard"
