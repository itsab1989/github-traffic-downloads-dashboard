<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Traffic &amp; Downloads — Interactive Dashboard</title>
  <!-- Chart.js + annotation plugin (release-date markers). No build step needed. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    :root {
      --bg: #ffffff; --panel: #ffffff; --text: #24292f; --muted: #57606a;
      --border: #d0d7de; --grid: rgba(0,0,0,0.08); --accent: #0969da;
      --series-all: #212121;
    }
    [data-theme="dark"] {
      --bg: #0d1117; --panel: #161b22; --text: #e6edf3; --muted: #8b949e;
      --border: #30363d; --grid: rgba(255,255,255,0.10); --accent: #2f81f7;
      --series-all: #c9d1d9;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
           font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
             padding: 20px 24px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 18px; margin: 0; flex: 1; }
    .meta { color: var(--muted); font-size: 13px; }
    .toggle { cursor: pointer; border: 1px solid var(--border); background: var(--panel);
              color: var(--text); border-radius: 6px; padding: 6px 12px; font-size: 13px; }
    main { max-width: 1040px; margin: 0 auto; padding: 24px; }
    .repo { margin-bottom: 40px; }
    .repo > h2 { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
            padding: 14px 16px 8px; }
    .card h3 { font-size: 14px; margin: 0 0 10px; color: var(--text); }
    .card .hint { color: var(--muted); font-size: 12px; margin: 0 0 8px; }
    .chart-wrap { position: relative; height: 260px; }
    .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>📊 GitHub Traffic &amp; Downloads — Interactive Dashboard</h1>
    <span class="meta" id="generated"></span>
    <button class="toggle" id="themeToggle" aria-label="Toggle dark mode">🌓 Theme</button>
  </header>
  <main id="root"><p class="empty">Loading chart data…</p></main>
  <footer>Rendered client-side from <code>assets/chart-data.json</code>, updated automatically by GitHub Actions.</footer>

  <script>
  (function () {
    const SERIES = {
      clones: { label: 'Clones', color: '#2196F3' },
      views:  { label: 'Views',  color: '#4CAF50' },
    };
    const DL_SERIES = [
      { key: 'total',   label: 'All',     varColor: '--series-all' },
      { key: 'windows', label: 'Windows', color: '#0078D6' },
      { key: 'macos',   label: 'macOS',   color: '#8E8E93' },
      { key: 'linux',   label: 'Linux',   color: '#E95420' },
    ];
    const charts = [];

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function applyThemeDefaults() {
      Chart.defaults.color = cssVar('--muted');
      Chart.defaults.borderColor = cssVar('--grid');
      Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;
    }

    function baseOptions() {
      return {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { boxWidth: 12, usePointStyle: true } },
          tooltip: { usePointStyle: true },
        },
        scales: {
          x: { grid: { color: cssVar('--grid') }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
          y: { beginAtZero: true, grid: { color: cssVar('--grid') }, ticks: { precision: 0 } },
        },
        elements: { line: { tension: 0.25 }, point: { radius: 0, hoverRadius: 4 } },
      };
    }

    function lineChart(canvas, labels, datasets, annotations) {
      const opts = baseOptions();
      if (annotations) opts.plugins.annotation = { annotations };
      const chart = new Chart(canvas, { type: 'line', data: { labels, datasets }, options: opts });
      charts.push(chart);
      return chart;
    }

    function trafficDatasets(block) {
      return Object.entries(SERIES).map(([key, s]) => ({
        label: s.label, data: block[key] || [], borderColor: s.color,
        backgroundColor: s.color, borderWidth: 2,
      }));
    }

    function downloadDatasets(block) {
      return DL_SERIES.map(s => {
        const color = s.color || cssVar(s.varColor);
        return {
          label: s.label, data: block[s.key] || [], borderColor: color,
          backgroundColor: color, borderWidth: s.key === 'total' ? 2.5 : 1.8,
        };
      });
    }

    // Vertical markers at release publish dates that fall within `labels`.
    function releaseAnnotations(labels, releases) {
      const anns = {};
      (releases || []).forEach((r, i) => {
        const idx = labels.indexOf(r.date);
        if (idx < 0) return;
        anns['rel' + i] = {
          type: 'line', scaleID: 'x', value: idx,
          borderColor: 'rgba(156,39,176,0.55)', borderWidth: 1, borderDash: [4, 4],
          label: { display: false, content: r.tag },
        };
      });
      return anns;
    }

    function card(parent, title, hint) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<h3>${title}</h3>${hint ? `<p class="hint">${hint}</p>` : ''}<div class="chart-wrap"><canvas></canvas></div>`;
      parent.appendChild(el);
      return el.querySelector('canvas');
    }

    function renderRepo(root, repo) {
      const section = document.createElement('section');
      section.className = 'repo';
      section.id = repo.anchor || repo.display;
      section.innerHTML = `<h2>${repo.display}</h2>`;
      const grid = document.createElement('div');
      grid.className = 'grid';
      section.appendChild(grid);
      root.appendChild(section);

      const t = repo.traffic, cfg = repo.config || {};
      lineChart(card(grid, `Daily Traffic (${cfg.daily_days || 30} days)`,
                'Clones and views per day.'), t.daily.dates, trafficDatasets(t.daily));
      lineChart(card(grid, `Weekly Traffic (${cfg.weekly_weeks || 12} weeks)`,
                'Aggregated into 7-day buckets.'), t.weekly.dates, trafficDatasets(t.weekly));
      lineChart(card(grid, `Bi-Weekly Traffic (${cfg.biweekly_periods || 26} periods)`,
                'Aggregated into 14-day buckets.'), t.biweekly.dates, trafficDatasets(t.biweekly));
      lineChart(card(grid, 'Cumulative Traffic (lifetime)',
                'Running totals over all tracked time.'), t.cumulative.dates, trafficDatasets(t.cumulative));

      const d = repo.downloads;
      if (d && d.has_data) {
        lineChart(card(grid, `Daily Downloads (${cfg.daily_days || 30} days)`,
                  'Per-platform downloads. Dashed purple lines mark release dates.'),
                  d.daily.dates, downloadDatasets(d.daily),
                  releaseAnnotations(d.daily.dates, d.releases));
        lineChart(card(grid, 'Cumulative Downloads (lifetime)',
                  'All-time running totals per platform.'),
                  d.cumulative.dates, downloadDatasets(d.cumulative));
      }
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      try { localStorage.setItem('dashboard-theme', theme); } catch (e) {}
      applyThemeDefaults();
      charts.forEach(c => {
        // Refresh theme-dependent colors (grid + the "All" series) then redraw.
        c.options.scales.x.grid.color = cssVar('--grid');
        c.options.scales.y.grid.color = cssVar('--grid');
        const all = c.data.datasets.find(ds => ds.label === 'All');
        if (all) { all.borderColor = all.backgroundColor = cssVar('--series-all'); }
        c.update('none');
      });
    }

    function initTheme() {
      let theme;
      try { theme = localStorage.getItem('dashboard-theme'); } catch (e) {}
      if (!theme) theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      applyThemeDefaults();
      document.getElementById('themeToggle').addEventListener('click', () => {
        setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    }

    initTheme();
    if (window.Chart && window['chartjs-plugin-annotation']) {
      Chart.register(window['chartjs-plugin-annotation']);
    }

    fetch('assets/chart-data.json', { cache: 'no-store' })
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        const root = document.getElementById('root');
        root.innerHTML = '';
        if (data.generated_at) {
          document.getElementById('generated').textContent = 'Updated ' + data.generated_at;
        }
        const repos = data.repositories || [];
        if (!repos.length) { root.innerHTML = '<p class="empty">No repositories in chart data.</p>'; return; }
        repos.forEach(repo => renderRepo(root, repo));
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<p class="empty">Could not load <code>assets/chart-data.json</code> (' + err.message +
          '). If you are viewing this on GitHub, open it via the GitHub Pages site instead.</p>';
      });
  })();
  </script>
</body>
</html>
